<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reforma">
<meta name="theme-color" content="#1a1612">
<link rel="manifest" href="manifest.json">
<title>Gastos Reforma</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sand:    #c8a97e;
  --sand-lt: #e8d5b8;
  --sand-dk: #8a6a42;
  --bg:      #f7f5f0;
  --surface: #ffffff;
  --surface2:#f0ede6;
  --border:  rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text:    #1c1a17;
  --text2:   #6b6358;
  --text3:   #a09880;
  --green:   #5a8a6a;
  --radius:  12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow:  0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:      #151310;
    --surface: #1e1b17;
    --surface2:#252118;
    --border:  rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text:    #f0ece4;
    --text2:   #b0a898;
    --text3:   #706858;
    --green:   #6aaa7a;
    --shadow:  0 2px 12px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ── */
.hero {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
  border-radius: 0 0 var(--radius-xl) var(--radius-xl);
}
.hero-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 40%;
  display: block;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,8,5,0.15) 0%,
    rgba(10,8,5,0.55) 55%,
    rgba(10,8,5,0.82) 100%
  );
}
.hero-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 0 1.5rem 1.75rem;
  text-align: center;
}
.hero-amount {
  font-size: clamp(48px, 12vw, 72px);
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -0.04em;
  line-height: 1;
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.hero-label {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 6px;
}
.hero-subv {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 5px 12px;
  margin-top: 10px;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  font-weight: 500;
}
.hero-subv-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7dd4a0;
  flex-shrink: 0;
}

/* ── RELOAD BTN ── */
.reload-wrap {
  position: absolute;
  top: env(safe-area-inset-top, 12px);
  top: calc(env(safe-area-inset-top, 0px) + 12px);
  right: 16px;
}
.reload-btn {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  cursor: pointer;
  font-weight: 500;
}
.reload-btn svg { width: 13px; height: 13px; }
.reload-btn.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CONTENT ── */
.content { padding: 1.25rem 1rem 3rem; max-width: 760px; margin: 0 auto; }

/* ── FILTERS ── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center; }
.filter-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
.filters select {
  font-size: 13px; padding: 7px 11px;
  border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--surface); color: var(--text);
  cursor: pointer; outline: none;
  box-shadow: var(--shadow);
}
.filters select:focus { border-color: var(--sand); }

/* ── SECTION TITLE ── */
.section-title {
  font-size: 11px; font-weight: 700;
  color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin: 1.5rem 0 0.75rem;
}

/* ── TOP 5 ── */
.top5 { display: flex; flex-direction: column; gap: 10px; margin-bottom: 0.5rem; }
.top5-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0.875rem 1rem;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
}
.top5-rank {
  font-size: 11px; font-weight: 700;
  color: var(--text3);
  min-width: 16px;
  text-align: center;
}
.top5-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.top5-info { flex: 1; min-width: 0; }
.top5-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top5-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; }
.top5-bar-fill { height: 3px; border-radius: 2px; transition: width 0.6s ease; }
.top5-amt { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; }

/* ── BREAKDOWN ── */
.breakdown { display: flex; flex-direction: column; gap: 8px; }
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.cat-card-header {
  display: flex; align-items: center; gap: 12px;
  padding: 0.875rem 1rem;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.cat-card-header:hover { background: var(--surface2); }
.cat-icon {
  width: 40px; height: 40px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 20px;
}
.cat-info { flex: 1; min-width: 0; }
.cat-name { font-size: 14px; font-weight: 600; color: var(--text); }
.cat-subs { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-amt-wrap { text-align: right; }
.cat-amt { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; white-space: nowrap; }
.cat-amt.positive { color: var(--green); }
.cat-chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; margin-left: 4px; }
.cat-chevron.open { transform: rotate(90deg); }
.cat-subs-list { display: none; border-top: 1px solid var(--border); }
.cat-subs-list.open { display: block; }
.sub-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.625rem 1rem 0.625rem 1.25rem;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.sub-item:last-child { border-bottom: none; }
.sub-name { font-size: 12px; color: var(--text2); flex: 1; }
.sub-bar-wrap { display: flex; align-items: center; gap: 6px; }
.sub-bar-bg { width: 50px; height: 3px; background: var(--surface2); border-radius: 2px; flex-shrink: 0; }
.sub-bar-fill { height: 3px; border-radius: 2px; }
.sub-amt { font-size: 12px; font-weight: 600; color: var(--text2); white-space: nowrap; min-width: 64px; text-align: right; }
.sub-amt.positive { color: var(--green); }

/* ── LAST MOVEMENTS ── */
.tx-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 0.875rem 1rem;
  cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: var(--shadow);
  transition: background 0.15s;
  user-select: none;
}
.tx-toggle:hover { background: var(--surface2); }
.tx-toggle-label { font-size: 13px; font-weight: 600; color: var(--text2); }
.tx-toggle-icon { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.tx-toggle-icon.open { transform: rotate(180deg); }
.tx-inner {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-top: -1px;
}
.tx-inner.open { display: block; }
.tx-subheader { padding: 0.75rem 1rem; display: flex; justify-content: flex-end; border-bottom: 1px solid var(--border); }
.tx-subheader select { font-size: 12px; padding: 5px 9px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); }
.tx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.tx-item:last-child { border-bottom: none; }
.tx-item:hover { background: var(--surface2); }
.tx-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tx-main { flex: 1; min-width: 0; }
.tx-concept { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.tx-amt { font-size: 13px; font-weight: 600; white-space: nowrap; }
.tx-amt.neg { color: var(--text); }
.tx-amt.pos { color: var(--green); }
.more-wrap { padding: 0.75rem 1rem; text-align: center; }
.btn-more { background: transparent; border: 1px solid var(--border2); color: var(--text3); font-size: 12px; padding: 7px 20px; border-radius: var(--radius); cursor: pointer; }
.btn-more:hover { background: var(--surface2); }

/* ── AUX ── */
.aux-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.aux-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.875rem 1rem; box-shadow: var(--shadow); }
.aux-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
.aux-value { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.aux-note { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* ── STATES ── */
.error-state { padding: 2rem 1rem; color: #c0392b; font-size: 14px; line-height: 1.6; text-align: center; }

/* ── RESPONSIVE ── */
@media (min-width: 600px) {
  .hero { height: 340px; }
  .hero-amount { font-size: 80px; }
  .top5-card { padding: 1rem 1.25rem; }
  .top5-icon { width: 44px; height: 44px; }
}
</style>
</head>

<script>
const GITHUB_USER = 'javier-vs';
const GITHUB_REPO = 'ReformaPontevedra-dashboard';
const EXCEL_FILE  = 'extracto_reforma.xlsx';
const BRANCH      = 'main';
const AUX_CATS    = ['Combustible','Comida'];
const SUBV_CAT    = 'Subvención E.E. y Reenbolsos';

const CAT_ICONS = {
  'Mobiliario y Cocina':       { emoji: '🪵', bg: '#e8d5b8', bgd: '#3a2e20' },
  'Fontanería y Calefacción':  { emoji: '🔧', bg: '#d4eae0', bgd: '#1a3028' },
  'Porcelánicos':               { emoji: '🏠', bg: '#fde8d8', bgd: '#3a1f10' },
  'Pladur y Aislamientos':     { emoji: '🧱', bg: '#e4e0f0', bgd: '#252038' },
  'Electricidad y Domótica':   { emoji: '⚡', bg: '#fef3d0', bgd: '#382c08' },
  'Electrodomésticos':          { emoji: '🍳', bg: '#fde0ec', bgd: '#380e22' },
  'Materiales Varios':          { emoji: '🔩', bg: '#e8e6e0', bgd: '#282420' },
  'Baños':                      { emoji: '🚿', bg: '#d4eef8', bgd: '#0e2838' },
  'Ventanas':                   { emoji: '🪟', bg: '#dce8f8', bgd: '#182840' },
  'Profesionales y Tasas':      { emoji: '📋', bg: '#d4d8f0', bgd: '#181c38' },
  'Demolición y Escombro':      { emoji: '⛏️', bg: '#dce8f8', bgd: '#182030' },
  'Pintura y Acabado':          { emoji: '🎨', bg: '#fde8d8', bgd: '#382018' },
  'Ventilación Forzada':        { emoji: '💨', bg: '#fef3d0', bgd: '#302808' },
  'Subvención E.E. y Reenbolsos': { emoji: '✅', bg: '#d4eae0', bgd: '#0e2820' },
};
const CAT_COLORS = {
  'Mobiliario y Cocina':'#c8a97e','Fontanería y Calefacción':'#5a9a7a',
  'Porcelánicos':'#c07050','Pladur y Aislamientos':'#8878c8',
  'Electricidad y Domótica':'#d4a030','Electrodomésticos':'#c05880',
  'Materiales Varios':'#909080','Baños':'#50a8c8','Ventanas':'#8898c8',
  'Profesionales y Tasas':'#4060a0','Demolición y Escombro':'#6090b0',
  'Pintura y Acabado':'#c07858','Ventilación Forzada':'#c09840',
  'Subvención E.E. y Reenbolsos':'#5a8a6a',
};

let DATA=[], txPage=0;
const PG=25;
const $=id=>document.getElementById(id);
const fmt=v=>Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'€';
const fmtFull=v=>(v<0?'-':'+')+Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';
const isDark=()=>window.matchMedia('(prefers-color-scheme: dark)').matches;

async function loadData(){
  const btn=$('reloadBtn'); btn.classList.add('loading');
  $('errorState').style.display='none';
  const urls=[
    `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${EXCEL_FILE}`,
    `https://cdn.jsdelivr.net/gh/${GITHUB_USER}/${GITHUB_REPO}@${BRANCH}/${EXCEL_FILE}`
  ];
  let buf=null,lastErr='';
  for(const url of urls){
    try{ const r=await fetch(url); if(!r.ok){lastErr=`HTTP ${r.status}`;continue;} buf=await r.arrayBuffer(); break; }
    catch(e){ lastErr=e.message; }
  }
  btn.classList.remove('loading');
  if(!buf){ $('errorState').style.display='block'; $('errorState').innerHTML=`<strong>No se pudo cargar el Excel.</strong><br><br>${lastErr}<br><br>El repositorio debe ser <strong>público</strong>.`; return; }
  try{ parseExcel(buf); } catch(e){ $('errorState').style.display='block'; $('errorState').textContent='Error: '+e.message; }
}

function parseExcel(buffer){
  const wb=XLSX.read(buffer,{type:'array',cellDates:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  let hIdx=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    const r=rows[i].map(c=>String(c||'').toUpperCase().trim());
    if(r.some(c=>c==='FECHA')&&r.some(c=>c==='IMPORTE')){hIdx=i;break;}
  }
  if(hIdx===-1) throw new Error('No se encontraron columnas FECHA e IMPORTE.');
  const headers=rows[hIdx].map(c=>String(c||'').toUpperCase().trim());
  const iF=headers.indexOf('FECHA'), iC=headers.indexOf('CONCEPTO'), iI=headers.indexOf('IMPORTE');
  const iSub=headers.findIndex(h=>h.includes('SUBCATEGOR'));
  const iCat=headers.findIndex(h=>h.includes('CATEGOR')&&!h.includes('SUBCATEGOR'));
  function toDate(v){
    if(typeof v==='string') return v.slice(0,10);
    if(typeof v==='number'){ const d=new Date(Math.round((v-25569)*86400000)); return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0'); }
    return String(v).slice(0,10);
  }
  DATA=[];
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i]; if(!r||r[iF]==null||String(r[iF]).trim()==='') continue;
    const imp=typeof r[iI]==='number'?r[iI]:parseFloat(String(r[iI]||'').replace(',','.'));
    if(isNaN(imp)) continue;
    DATA.push({FECHA:toDate(r[iF]),CONCEPTO:String(r[iC]||'').trim(),IMPORTE:imp,CATEGORIA:String(r[iCat]||'Sin categoría').trim(),SUBCATEGORIA:String(r[iSub]||'').trim()});
  }
  if(DATA.length===0) throw new Error('No se encontraron filas válidas.');
  $('mainContent').style.display='block';
  buildCatSelect();
  update();
}

function filtered(){
  const yr=$('filterPeriod').value, cat=$('filterCat').value;
  return DATA.filter(d=>(yr==='all'||d.FECHA.startsWith(yr))&&(cat==='all'||d.CATEGORIA===cat));
}

function buildCatSelect(){
  const s=$('filterCat'); s.innerHTML='<option value="all">Todas</option>';
  [...new Set(DATA.map(d=>d.CATEGORIA))].sort().forEach(c=>{ const o=document.createElement('option'); o.value=c; o.text=c; s.appendChild(o); });
}
function buildSubcatSelect(data){
  const s=$('filterSubcat'),cur=s.value; s.innerHTML='<option value="all">Todas las subcategorías</option>';
  [...new Set(data.map(d=>d.SUBCATEGORIA).filter(Boolean))].sort().forEach(c=>{ const o=document.createElement('option'); o.value=c; o.text=c; if(c===cur)o.selected=true; s.appendChild(o); });
}

function renderHero(data){
  const bruto=data.filter(d=>!AUX_CATS.includes(d.CATEGORIA)&&d.CATEGORIA!==SUBV_CAT&&d.IMPORTE<0).reduce((a,d)=>a+d.IMPORTE,0);
  const subv=data.filter(d=>d.CATEGORIA===SUBV_CAT).reduce((a,d)=>a+d.IMPORTE,0);
  const neto=bruto+subv;
  $('heroAmount').textContent=fmt(neto);
  $('heroSubvText').textContent='Incluye '+fmt(subv)+' en subvenciones';
}

function renderTop5(data){
  const byC={};
  data.filter(d=>!AUX_CATS.includes(d.CATEGORIA)&&d.CATEGORIA!==SUBV_CAT).forEach(d=>{
    byC[d.CATEGORIA]=(byC[d.CATEGORIA]||0)+d.IMPORTE;
  });
  const top=Object.entries(byC).sort((a,b)=>a[1]-b[1]).slice(0,5);
  const maxAbs=top.length?Math.abs(top[0][1]):1;
  const dark=isDark();
  const el=$('top5'); el.innerHTML='';
  top.forEach(([cat,total],idx)=>{
    const info=CAT_ICONS[cat]||{emoji:'📦',bg:'#e8e6e0',bgd:'#282420'};
    const col=CAT_COLORS[cat]||'#909080';
    const pct=(Math.abs(total)/maxAbs*100).toFixed(0);
    const d=document.createElement('div'); d.className='top5-card';
    d.innerHTML=`
      <div class="top5-rank">${idx+1}</div>
      <div class="top5-icon" style="background:${dark?info.bgd:info.bg}">${info.emoji}</div>
      <div class="top5-info">
        <div class="top5-name">${cat}</div>
        <div class="top5-bar-bg"><div class="top5-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
      <div class="top5-amt">${fmt(total)}</div>`;
    el.appendChild(d);
  });
}

function renderBreakdown(data){
  const byC={};
  data.filter(d=>!AUX_CATS.includes(d.CATEGORIA)).forEach(d=>{
    if(!byC[d.CATEGORIA]) byC[d.CATEGORIA]={t:0,subs:{}};
    byC[d.CATEGORIA].t+=d.IMPORTE;
    const s=d.SUBCATEGORIA||'Sin subcategoría';
    if(!byC[d.CATEGORIA].subs[s]) byC[d.CATEGORIA].subs[s]={t:0};
    byC[d.CATEGORIA].subs[s].t+=d.IMPORTE;
  });
  const neg=Object.entries(byC).filter(x=>x[1].t<0).sort((a,b)=>a[1].t-b[1].t);
  const pos=Object.entries(byC).filter(x=>x[1].t>=0).sort((a,b)=>b[1].t-a[1].t);
  const sorted=[...neg,...pos];
  const maxAbs=sorted.length?Math.max(...sorted.map(x=>Math.abs(x[1].t))):1;
  const dark=isDark();
  const el=$('breakdown'); el.innerHTML='';

  sorted.forEach(([cat,info])=>{
    const catInfo=CAT_ICONS[cat]||{emoji:'📦',bg:'#e8e6e0',bgd:'#282420'};
    const col=CAT_COLORS[cat]||'#909080';
    const isPos=info.t>=0;
    const subs=Object.entries(info.subs).sort((a,b)=>a[1].t-b[1].t);
    const subNames=subs.map(s=>s[0]).join(', ');
    const key='k'+Math.random().toString(36).slice(2);

    const card=document.createElement('div'); card.className='cat-card';
    card.innerHTML=`
      <div class="cat-card-header" onclick="toggleCat('${key}')">
        <div class="cat-icon" style="background:${dark?catInfo.bgd:catInfo.bg}">${catInfo.emoji}</div>
        <div class="cat-info">
          <div class="cat-name">${cat}</div>
          <div class="cat-subs">${subNames}</div>
        </div>
        <div class="cat-amt-wrap">
          <span class="cat-amt${isPos?' positive':''}">${isPos?'+':''}${fmt(info.t)}</span>
          <span class="cat-chevron" id="chev_${key}">▶</span>
        </div>
      </div>
      <div class="cat-subs-list" id="subs_${key}">
        ${subs.map(([sub,sinfo])=>{
          const sp=(Math.abs(sinfo.t)/maxAbs*100).toFixed(0);
          const sPos=sinfo.t>=0;
          return `<div class="sub-item">
            <span class="sub-name">${sub}</span>
            <div class="sub-bar-wrap">
              <div class="sub-bar-bg"><div class="sub-bar-fill" style="width:${sp}%;background:${col}88"></div></div>
              <span class="sub-amt${sPos?' positive':''}">${sPos?'+':''}${fmt(sinfo.t)}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    el.appendChild(card);
  });
}

function toggleCat(key){
  const list=document.getElementById('subs_'+key);
  const chev=document.getElementById('chev_'+key);
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

function toggleTx(){
  const inner=$('txInner'),icon=$('txIcon');
  const open=inner.classList.contains('open');
  inner.classList.toggle('open',!open);
  icon.classList.toggle('open',!open);
  $('txToggle').style.borderRadius=open?'var(--radius-lg)':'var(--radius-lg) var(--radius-lg) 0 0';
}

function renderTx(data,reset){
  if(reset) txPage=0;
  const sub=$('filterSubcat').value;
  const src=(sub==='all'?data:data.filter(d=>d.SUBCATEGORIA===sub)).slice().sort((a,b)=>b.FECHA.localeCompare(a.FECHA));
  const slice=src.slice(0,(txPage+1)*PG);
  const el=$('txList'); el.innerHTML='';
  slice.forEach(d=>{
    const col=CAT_COLORS[d.CATEGORIA]||'#909080';
    const neg=d.IMPORTE<0;
    const dd=d.FECHA;
    const ds=dd.length>=10?dd.slice(8)+'.'+dd.slice(5,7)+'.'+dd.slice(0,4):dd;
    const item=document.createElement('div'); item.className='tx-item';
    item.innerHTML=`
      <div class="tx-dot" style="background:${col}"></div>
      <div class="tx-main">
        <div class="tx-concept">${d.CONCEPTO}</div>
        <div class="tx-meta">${ds} · ${d.SUBCATEGORIA||d.CATEGORIA}</div>
      </div>
      <div class="tx-amt ${neg?'neg':'pos'}">${fmtFull(d.IMPORTE)}</div>`;
    el.appendChild(item);
  });
  $('btnMore').style.display=slice.length<src.length?'inline-block':'none';
}

function update(){
  const data=filtered();
  buildSubcatSelect(data);
  renderHero(data);
  renderTop5(data);
  renderBreakdown(data);
  renderTx(data,true);
  const comb=data.filter(d=>d.CATEGORIA==='Combustible').reduce((a,d)=>a+d.IMPORTE,0);
  const comida=data.filter(d=>d.CATEGORIA==='Comida').reduce((a,d)=>a+d.IMPORTE,0);
  $('auxComb').textContent=fmt(comb);
  $('auxComida').textContent=fmt(comida);
}

$('filterPeriod').addEventListener('change',update);
$('filterCat').addEventListener('change',update);
$('filterSubcat').addEventListener('change',()=>renderTx(filtered(),true));
$('btnMore').addEventListener('click',()=>{ txPage++; renderTx(filtered(),false); });

loadData();
</script>
</body>
</html>
