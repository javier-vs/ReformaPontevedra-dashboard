@media(prefers-color-scheme:dark){:root{
  --bg:#151310;--surface:#1e1b17;--surface2:#252118;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0ece4;--text2:#b0a898;--text3:#706858;
  --green:#5aaa7a;
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hero{position:relative;width:100%;height:280px;overflow:hidden;border-radius:0 0 var(--radius-xl) var(--radius-xl)}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,8,5,0.1) 0%,rgba(10,8,5,0.55) 55%,rgba(10,8,5,0.82) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 1.5rem 1.75rem;text-align:center}
.hero-amount{font-size:clamp(48px,12vw,72px);font-weight:700;color:#fff;letter-spacing:-0.04em;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,0.3)}
.hero-label{font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.12em;margin-top:6px}
.hero-subv{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:5px 12px;margin-top:10px;font-size:12px;color:rgba(255,255,255,0.9);font-weight:500}
.hero-subv-dot{width:6px;height:6px;border-radius:50%;background:#5aaa7a;flex-shrink:0}
.content{padding:1.25rem 1rem 3rem;max-width:760px;margin:0 auto}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin:1.5rem 0 0.75rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow)}
.chart-canvas-wrap{position:relative;width:220px;height:220px;margin:0 auto}
.breakdown{display:flex;flex-direction:column;gap:8px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.cat-card-header{display:flex;align-items:center;gap:12px;padding:0.875rem 1rem;cursor:pointer;transition:background 0.15s;user-select:none}
.cat-card-header:hover{background:var(--surface2)}
.cat-icon{width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.cat-name{flex:1;font-size:14px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-amt{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap;flex-shrink:0}
.cat-amt.pos{color:var(--green)}
.cat-chevron{font-size:10px;color:var(--text3);transition:transform 0.2s;margin-left:6px;flex-shrink:0}
.cat-chevron.open{transform:rotate(90deg)}
.cat-subs-list{display:none;border-top:1px solid var(--border)}
.cat-subs-list.open{display:block}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem 0.6rem 1.25rem;border-bottom:1px solid var(--border);gap:8px}
.sub-item:last-child{border-bottom:none}
.sub-name{font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-amt{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;text-align:right}
.sub-amt.pos{color:var(--green)}
.aux-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.aux-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.875rem 1rem;box-shadow:var(--shadow)}
.aux-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.aux-value{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.aux-note{font-size:10px;color:var(--text3);margin-top:3px}
.reload-wrap{text-align:center;margin-top:2rem}
.reload-btn{display:inline-flex;align-items:center;gap:7px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 20px;font-size:13px;cursor:pointer;transition:background 0.15s}
.reload-btn:hover{background:var(--surface2);color:var(--text2)}
.reload-btn svg{width:14px;height:14px;flex-shrink:0}
.reload-btn.loading svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:2rem 1rem;color:#c0392b;font-size:14px;line-height:1.6;text-align:center}
.loading-state{padding:4rem 1rem;color:var(--text3);font-size:14px;text-align:center}
@media(min-width:600px){.hero{height:340px}.hero-amount{font-size:80px}.chart-canvas-wrap{width:280px;height:280px}}
</style>
</head>

<script>
const GITHUB_USER='javier-vs',GITHUB_REPO='ReformaPontevedra-dashboard',EXCEL_FILE='extracto_reforma.xlsx',BRANCH='main';
const AUX_CATS=['Combustible','Comida'],SUBV_CAT='Subvenciones y Reembolsos';
const CAT_EMOJIS={'Carpintería y Cocina':'🚪','Fontanería y Calefacción':'♨️','Suelos y Revestimientos':'👷','Tabiques y Aislamientos':'🧱','Electricidad y Domótica':'⚡','Ferretería y Consumibles':'🔧','Baños':'🛁','Ventanas':'🪟','Profesionales y Tasas':'💼','Demolición':'🔨','Pintura y Acabado':'🎨','Ventilación':'💨','Subvenciones y Reembolsos':'💶'};
const TOP5_COLORS=['#2E86AB','#C1440E','#3D7A4A','#7B3F7A','#C98B00'],REST_COLOR='#9E9E9E';
const BORDER_WIDTH=3,HOVER_OFFSET=14;
let DATA=[],pieChart=null;
const $=id=>document.getElementById(id);
const fmt=v=>Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'€';
async function loadData(){
  const btn=$('reloadBtn');if(btn)btn.classList.add('loading');
  const urls=[`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${EXCEL_FILE}`,`https://cdn.jsdelivr.net/gh/${GITHUB_USER}/${GITHUB_REPO}@${BRANCH}/${EXCEL_FILE}`];
  let buf=null,lastErr='';
  for(const url of urls){try{const r=await fetch(url);if(!r.ok){lastErr=`HTTP ${r.status}`;continue;}buf=await r.arrayBuffer();break;}catch(e){lastErr=e.message;}}
  if(btn)btn.classList.remove('loading');
  if(!buf){$('loadingState').style.display='none';$('errorState').style.display='block';$('errorState').innerHTML=`<strong>No se pudo cargar el Excel.</strong><br><br>${lastErr}<br><br>El repositorio debe ser <strong>público</strong>.`;return;}
  try{parseExcel(buf);}catch(e){$('loadingState').style.display='none';$('errorState').style.display='block';$('errorState').textContent='Error: '+e.message;}
}
function parseExcel(buffer){
  const wb=XLSX.read(buffer,{type:'array',cellDates:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  let hIdx=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){const r=rows[i].map(c=>String(c||'').toUpperCase().trim());if(r.some(c=>c==='FECHA')&&r.some(c=>c==='IMPORTE')){hIdx=i;break;}}
  if(hIdx===-1)throw new Error('No se encontraron columnas FECHA e IMPORTE.');
  const headers=rows[hIdx].map(c=>String(c||'').toUpperCase().trim());
  const iF=headers.indexOf('FECHA'),iC=headers.indexOf('CONCEPTO'),iI=headers.indexOf('IMPORTE');
  const iSub=headers.findIndex(h=>h.includes('SUBCATEGOR'));
  const iCat=headers.findIndex(h=>h.includes('CATEGOR')&&!h.includes('SUBCATEGOR'));
  function toDate(v){if(typeof v==='string')return v.slice(0,10);if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}return String(v).slice(0,10);}
  DATA=[];
  for(let i=hIdx+1;i<rows.length;i++){const r=rows[i];if(!r||r[iF]==null||String(r[iF]).trim()==='')continue;const imp=typeof r[iI]==='number'?r[iI]:parseFloat(String(r[iI]||'').replace(',','.'));if(isNaN(imp))continue;DATA.push({FECHA:toDate(r[iF]),CONCEPTO:String(r[iC]||'').trim(),IMPORTE:imp,CATEGORIA:String(r[iCat]||'Sin categoría').trim(),SUBCATEGORIA:String(r[iSub]||'').trim()});}
  if(DATA.length===0)throw new Error('No se encontraron filas válidas.');
  $('loadingState').style.display='none';$('mainContent').style.display='block';render();
}
function render(){
  const total=DATA.filter(d=>!AUX_CATS.includes(d.CATEGORIA)).reduce((a,d)=>a+d.IMPORTE,0);
  const subv=DATA.filter(d=>d.CATEGORIA===SUBV_CAT).reduce((a,d)=>a+d.IMPORTE,0);
  $('heroAmount').textContent=fmt(total);
  $('heroSubvText').textContent='Incluye '+fmt(subv)+' en subvenciones';
  $('auxComb').textContent=fmt(DATA.filter(d=>d.CATEGORIA==='Combustible').reduce((a,d)=>a+d.IMPORTE,0));
  $('auxComida').textContent=fmt(DATA.filter(d=>d.CATEGORIA==='Comida').reduce((a,d)=>a+d.IMPORTE,0));
  const byC={};
  DATA.filter(d=>!AUX_CATS.includes(d.CATEGORIA)).forEach(d=>{
    if(!byC[d.CATEGORIA])byC[d.CATEGORIA]={t:0,subs:{}};
    byC[d.CATEGORIA].t+=d.IMPORTE;
    const s=d.SUBCATEGORIA||'Sin subcategoría';
    if(!byC[d.CATEGORIA].subs[s])byC[d.CATEGORIA].subs[s]={t:0};
    byC[d.CATEGORIA].subs[s].t+=d.IMPORTE;
  });
  renderPie(byC);renderBreakdown(byC);
}
function renderPie(byC){
  const sorted=Object.entries(byC).filter(([cat])=>cat!==SUBV_CAT).sort((a,b)=>Math.abs(b[1].t)-Math.abs(a[1].t));
  const top5=sorted.slice(0,5),rest=sorted.slice(5);
  const restTotal=rest.reduce((a,x)=>a+Math.abs(x[1].t),0);
  const labels=top5.map(x=>x[0]),values=top5.map(x=>Math.round(Math.abs(x[1].t))),colors=[...TOP5_COLORS];
  if(restTotal>0){labels.push('Resto');values.push(Math.round(restTotal));colors.push(REST_COLOR);}
  if(pieChart)pieChart.destroy();
  pieChart=new Chart($('pieChart'),{
    type:'pie',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:BORDER_WIDTH,borderColor:'#ffffff',hoverOffset:HOVER_OFFSET}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return ' '+ctx.label+': '+ctx.raw.toLocaleString('es-ES')+'€ ('+(ctx.raw/t*100).toFixed(1)+'%)';},labelColor:ctx=>({backgroundColor:colors[ctx.dataIndex],borderColor:'transparent',borderRadius:3})}}}}
  });
}
function renderBreakdown(byC){
  const neg=Object.entries(byC).filter(x=>x[1].t<0).sort((a,b)=>a[1].t-b[1].t);
  const pos=Object.entries(byC).filter(x=>x[1].t>=0).sort((a,b)=>b[1].t-a[1].t);
  const el=$('breakdown');el.innerHTML='';
  [...neg,...pos].forEach(([cat,info])=>{
    const emoji=CAT_EMOJIS[cat]||'📦',isPos=info.t>=0;
    const subs=Object.entries(info.subs).sort((a,b)=>a[1].t-b[1].t);
    const key='k'+Math.random().toString(36).slice(2,8);
    const card=document.createElement('div');card.className='cat-card';
    card.innerHTML=`<div class="cat-card-header" onclick="toggleCat('${key}')"><div class="cat-icon">${emoji}</div><span class="cat-name">${cat}</span><span class="cat-amt${isPos?' pos':''}">${isPos?'+':''}${fmt(info.t)}</span><span class="cat-chevron" id="chev_${key}">▶</span></div><div class="cat-subs-list" id="subs_${key}">${subs.map(([sub,sinfo])=>{const sPos=sinfo.t>=0;return`<div class="sub-item"><span class="sub-name">${sub}</span><span class="sub-amt${sPos?' pos':''}">${sPos?'+':''}${fmt(sinfo.t)}</span></div>`;}).join('')}</div>`;
    el.appendChild(card);
  });
}
function toggleCat(key){const list=document.getElementById('subs_'+key),chev=document.getElementById('chev_'+key),open=list.classList.contains('open');list.classList.toggle('open',!open);chev.classList.toggle('open',!open);}
loadData();
</script>
</body>
