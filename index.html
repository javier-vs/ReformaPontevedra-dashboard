<title>Gastos Reforma</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#c8a97e;--sand-lt:#e8d5b8;--sand-dk:#8a6a42;
  --bg:#f7f5f0;--surface:#ffffff;--surface2:#f0ede6;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1c1a17;--text2:#6b6358;--text3:#a09880;
  --green:#5a8a6a;--radius:12px;--radius-lg:18px;--radius-xl:24px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 8px 32px rgba(0,0,0,0.11);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#151310;--surface:#1e1b17;--surface2:#252118;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0ece4;--text2:#b0a898;--text3:#706858;
  --green:#6aaa7a;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HERO */
.hero{position:relative;width:100%;height:280px;overflow:hidden;border-radius:0 0 var(--radius-xl) var(--radius-xl)}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,8,5,0.1) 0%,rgba(10,8,5,0.55) 55%,rgba(10,8,5,0.82) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 1.5rem 1.75rem;text-align:center}
.hero-amount{font-size:clamp(48px,12vw,72px);font-weight:700;color:#fff;letter-spacing:-0.04em;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,0.3)}
.hero-label{font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.12em;margin-top:6px}
.hero-subv{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:5px 12px;margin-top:10px;font-size:12px;color:rgba(255,255,255,0.9);font-weight:500}
.hero-subv-dot{width:6px;height:6px;border-radius:50%;background:#7dd4a0;flex-shrink:0}

/* CONTENT */
.content{padding:1.25rem 1rem 3rem;max-width:760px;margin:0 auto}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin:1.5rem 0 0.75rem}

/* DONUT */
.donut-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:0.5rem}
.donut-wrap{position:relative;width:100%;max-width:280px;margin:0 auto}

/* BREAKDOWN */
.breakdown{display:flex;flex-direction:column;gap:8px}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
.cat-card-header{display:flex;align-items:center;gap:12px;padding:0.875rem 1rem;cursor:pointer;transition:background 0.15s;user-select:none}
.cat-card-header:hover{background:var(--surface2)}
.cat-icon{width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.cat-bar-bg{height:3px;background:var(--surface2);border-radius:2px}
.cat-bar-fill{height:3px;border-radius:2px;transition:width 0.5s ease}
.cat-amt{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.cat-amt.pos{color:var(--green)}
.cat-chevron{font-size:10px;color:var(--text3);transition:transform 0.2s;margin-left:6px;flex-shrink:0}
.cat-chevron.open{transform:rotate(90deg)}
.cat-subs-list{display:none;border-top:1px solid var(--border)}
.cat-subs-list.open{display:block}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem 0.6rem 1.25rem;border-bottom:1px solid var(--border);gap:8px}
.sub-item:last-child{border-bottom:none}
.sub-name{font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sub-bar-bg{width:44px;height:3px;background:var(--surface2);border-radius:2px}
.sub-bar-fill{height:3px;border-radius:2px}
.sub-amt{font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap;min-width:60px;text-align:right}
.sub-amt.pos{color:var(--green)}

/* AUX */
.aux-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.aux-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0.875rem 1rem;box-shadow:var(--shadow)}
.aux-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px}
.aux-value{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.aux-note{font-size:10px;color:var(--text3);margin-top:3px}

.error-state{padding:2rem 1rem;color:#c0392b;font-size:14px;line-height:1.6;text-align:center}
.loading-state{padding:4rem 1rem;color:var(--text3);font-size:14px;text-align:center}

@media(min-width:600px){
  .hero{height:340px}
  .hero-amount{font-size:80px}
  .donut-wrap{max-width:340px}
}
</style>
</head>

<script>
const GITHUB_USER='javier-vs';
const GITHUB_REPO='ReformaPontevedra-dashboard';
const EXCEL_FILE='extracto_reforma.xlsx';
const BRANCH='main';
const AUX_CATS=['Combustible','Comida'];
const SUBV_CAT='Subvenciones y Reembolsos';

const CAT_EMOJIS={
  'Carpintería y Cocina':'🚪',
  'Fontanería y Calefacción':'♨️',
  'Suelos y Revestimientos':'👷',
  'Tabiques y Aislamientos':'🧱',
  'Electricidad y Domótica':'⚡',
  'Ferretería y Consumibles':'🔧',
  'Baños':'🛁',
  'Ventanas':'🪟',
  'Profesionales y Tasas':'💼',
  'Demolición':'🔨',
  'Pintura y Acabado':'🎨',
  'Ventilación':'💨',
  'Subvenciones y Reembolsos':'💶',
};

const CAT_COLORS={
  'Carpintería y Cocina':'#c8a97e',
  'Fontanería y Calefacción':'#5a9a7a',
  'Suelos y Revestimientos':'#c07050',
  'Tabiques y Aislamientos':'#8878c8',
  'Electricidad y Domótica':'#d4a030',
  'Ferretería y Consumibles':'#909080',
  'Baños':'#50a8c8',
  'Ventanas':'#8898c8',
  'Profesionales y Tasas':'#4060a0',
  'Demolición':'#6090b0',
  'Pintura y Acabado':'#c07858',
  'Ventilación':'#c09840',
  'Subvenciones y Reembolsos':'#5a8a6a',
};

let DATA=[], donutChart=null;
const $=id=>document.getElementById(id);
const fmt=v=>Math.abs(v).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'€';

async function loadData(){
  const urls=[
    `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${EXCEL_FILE}`,
    `https://cdn.jsdelivr.net/gh/${GITHUB_USER}/${GITHUB_REPO}@${BRANCH}/${EXCEL_FILE}`
  ];
  let buf=null,lastErr='';
  for(const url of urls){
    try{const r=await fetch(url);if(!r.ok){lastErr=`HTTP ${r.status}`;continue;}buf=await r.arrayBuffer();break;}
    catch(e){lastErr=e.message;}
  }
  if(!buf){
    $('loadingState').style.display='none';
    $('errorState').style.display='block';
    $('errorState').innerHTML=`<strong>No se pudo cargar el Excel.</strong><br><br>${lastErr}<br><br>El repositorio debe ser <strong>público</strong>.`;
    return;
  }
  try{parseExcel(buf);}
  catch(e){$('loadingState').style.display='none';$('errorState').style.display='block';$('errorState').textContent='Error: '+e.message;}
}

function parseExcel(buffer){
  const wb=XLSX.read(buffer,{type:'array',cellDates:false});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
  let hIdx=-1;
  for(let i=0;i<Math.min(rows.length,10);i++){
    const r=rows[i].map(c=>String(c||'').toUpperCase().trim());
    if(r.some(c=>c==='FECHA')&&r.some(c=>c==='IMPORTE')){hIdx=i;break;}
  }
  if(hIdx===-1)throw new Error('No se encontraron columnas FECHA e IMPORTE.');
  const headers=rows[hIdx].map(c=>String(c||'').toUpperCase().trim());
  const iF=headers.indexOf('FECHA');
  const iC=headers.indexOf('CONCEPTO');
  const iI=headers.indexOf('IMPORTE');
  const iSub=headers.findIndex(h=>h.includes('SUBCATEGOR'));
  const iCat=headers.findIndex(h=>h.includes('CATEGOR')&&!h.includes('SUBCATEGOR'));
  function toDate(v){
    if(typeof v==='string')return v.slice(0,10);
    if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400000));return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
    return String(v).slice(0,10);
  }
  DATA=[];
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];
    if(!r||r[iF]==null||String(r[iF]).trim()==='')continue;
    const imp=typeof r[iI]==='number'?r[iI]:parseFloat(String(r[iI]||'').replace(',','.'));
    if(isNaN(imp))continue;
    DATA.push({FECHA:toDate(r[iF]),CONCEPTO:String(r[iC]||'').trim(),IMPORTE:imp,CATEGORIA:String(r[iCat]||'Sin categoría').trim(),SUBCATEGORIA:String(r[iSub]||'').trim()});
  }
  if(DATA.length===0)throw new Error('No se encontraron filas válidas.');
  $('loadingState').style.display='none';
  $('mainContent').style.display='block';
  render();
}

function render(){
  // Hero
  const total=DATA.filter(d=>!AUX_CATS.includes(d.CATEGORIA)).reduce((a,d)=>a+d.IMPORTE,0);
  const subv=DATA.filter(d=>d.CATEGORIA===SUBV_CAT).reduce((a,d)=>a+d.IMPORTE,0);
  $('heroAmount').textContent=fmt(total);
  $('heroSubvText').textContent='Incluye '+fmt(subv)+' en subvenciones';

  // Aux
  $('auxComb').textContent=fmt(DATA.filter(d=>d.CATEGORIA==='Combustible').reduce((a,d)=>a+d.IMPORTE,0));
  $('auxComida').textContent=fmt(DATA.filter(d=>d.CATEGORIA==='Comida').reduce((a,d)=>a+d.IMPORTE,0));

  // By category
  const byC={};
  DATA.filter(d=>!AUX_CATS.includes(d.CATEGORIA)).forEach(d=>{
    if(!byC[d.CATEGORIA])byC[d.CATEGORIA]={t:0,subs:{}};
    byC[d.CATEGORIA].t+=d.IMPORTE;
    const s=d.SUBCATEGORIA||'Sin subcategoría';
    if(!byC[d.CATEGORIA].subs[s])byC[d.CATEGORIA].subs[s]={t:0};
    byC[d.CATEGORIA].subs[s].t+=d.IMPORTE;
  });

  renderDonut(byC);
  renderBreakdown(byC);
}

function renderDonut(byC){
  // Exclude subvenciones from donut
  const entries=Object.entries(byC)
    .filter(([cat])=>cat!==SUBV_CAT)
    .sort((a,b)=>a[1].t-b[1].t);
  const labels=entries.map(x=>x[0]);
  const values=entries.map(x=>Math.round(Math.abs(x[1].t)));
  const colors=labels.map(l=>CAT_COLORS[l]||'#909080');

  // Dynamic height
  const sz=Math.min(window.innerWidth-80,300);
  $('donutChart').parentElement.style.height=sz+'px';

  if(donutChart)donutChart.destroy();
  donutChart=new Chart($('donutChart'),{
    type:'doughnut',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'transparent',hoverBorderColor:'transparent'}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>' '+ctx.label+': '+ctx.raw.toLocaleString('es-ES')+'€',
            labelColor:ctx=>({backgroundColor:colors[ctx.dataIndex],borderColor:'transparent'})
          }
        }
      }
    }
  });
}

function renderBreakdown(byC){
  const neg=Object.entries(byC).filter(x=>x[1].t<0).sort((a,b)=>a[1].t-b[1].t);
  const pos=Object.entries(byC).filter(x=>x[1].t>=0).sort((a,b)=>b[1].t-a[1].t);
  const sorted=[...neg,...pos];
  const maxAbs=sorted.length?Math.max(...sorted.map(x=>Math.abs(x[1].t))):1;
  const el=$('breakdown');el.innerHTML='';

  sorted.forEach(([cat,info])=>{
    const emoji=CAT_EMOJIS[cat]||'📦';
    const col=CAT_COLORS[cat]||'#909080';
    const isPos=info.t>=0;
    const pct=(Math.abs(info.t)/maxAbs*100).toFixed(1);
    const subs=Object.entries(info.subs).sort((a,b)=>a[1].t-b[1].t);
    const key='k'+Math.random().toString(36).slice(2,8);

    const card=document.createElement('div');card.className='cat-card';
    card.innerHTML=`
      <div class="cat-card-header" onclick="toggleCat('${key}')">
        <div class="cat-icon">${emoji}</div>
        <div class="cat-info">
          <div class="cat-name">${cat}</div>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        </div>
        <span class="cat-amt${isPos?' pos':''}">${isPos?'+':''}${fmt(info.t)}</span>
        <span class="cat-chevron" id="chev_${key}">▶</span>
      </div>
      <div class="cat-subs-list" id="subs_${key}">
        ${subs.map(([sub,sinfo])=>{
          const sp=(Math.abs(sinfo.t)/maxAbs*100).toFixed(1);
          const sPos=sinfo.t>=0;
          return `<div class="sub-item">
            <span class="sub-name">${sub}</span>
            <div class="sub-right">
              <div class="sub-bar-bg"><div class="sub-bar-fill" style="width:${sp}%;background:${col}88"></div></div>
              <span class="sub-amt${sPos?' pos':''}">${sPos?'+':''}${fmt(sinfo.t)}</span>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    el.appendChild(card);
  });
}

function toggleCat(key){
  const list=document.getElementById('subs_'+key);
  const chev=document.getElementById('chev_'+key);
  const open=list.classList.contains('open');
  list.classList.toggle('open',!open);
  chev.classList.toggle('open',!open);
}

loadData();
</script>
